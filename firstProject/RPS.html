<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="tittle">Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
    <body>
        <p class="tittle">Rock Paper Scissors Game</p>

        <button onclick="playGame('Rock');" class="move-button js-rock"><img src="images/rock-emoji.png" alt="rock-emoji" class="move-icon"></button>
        <button onclick="playGame('Paper');" class="move-button js-paper"><img src="images/paper-emoji.png" alt="paper-emoji" class="move-icon"></button>
        <button onclick="playGame('Scissors')" class="move-button js-scissors"><img src="images/scissors-emoji.png" alt="scissors-emoji" class="move-icon"></button>
        <p class="js-winLose winLose"></p>
        <p class="js-showResult result">Current score:</p>
        <p class="js-showMoves showMoves"></p>
        <button onclick="resetScore();" class="reset">reset score</button>
        


        <script src="scripts/scripts.js"></script>
    </body>
</html>
